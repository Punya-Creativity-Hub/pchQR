<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!-- ✅ FIXED viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

    <title>PCH QR Generator</title>

    <script src="https://cdn.jsdelivr.net/npm/qr-code-styling/lib/qr-code-styling.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --primary-blue: #3a86ff;
            --primary-orange: #f3722c;
            --bg1: #195591;
            --bg2: #243B55;
            --text: rgba(255, 255, 255, 0.95);
            --muted: rgba(255, 255, 255, 0.7);
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(var(--bg1), var(--bg2));
            color: var(--text);
            padding: 15px;
        }

        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .qr-container {
            width: 370px;
            max-width: 100%;
            padding: 25px;
            border-radius: 22px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .logo {
            width: 100px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 6px;
        }

        p {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 18px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .input-wrapper input {
            width: 100%;
            height: 50px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.12);
            color: white;
            padding: 0 45px 0 14px;
            outline: none;

            /* ✅ FIX: prevents mobile zoom */
            font-size: 16px;
        }

        .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .paste-btn {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: none;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            cursor: pointer;
        }

        button {
            width: 100%;
            height: 48px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--primary-blue);
            color: white;
        }

        .btn-secondary {
            background: var(--primary-orange);
            color: white;
        }

        #qrBox {
            margin-top: 20px;
            display: none;
            justify-content: center;
            align-items: center;
        }

        #controls {
            display: none;
            margin-top: 20px;
        }

        .control-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .control-row select {
            flex: 1;
            height: 45px;
            border-radius: 10px;
        }

        .color-picker {
            position: relative;
            flex: 1;
            height: 45px;
        }

        .color-picker input {
            width: 100%;
            height: 100%;
            border-radius: 10px;
            border: none;
        }

        .color-icon {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
        }

        /* ✅ Responsive fix */
        @media (max-width: 480px) {
            .qr-container {
                width: 100%;
                padding: 18px;
            }

            .logo {
                width: 80px;
            }
        }

        /* ✅ FIXED FOOTER */
        .footer {
            display: flex;
            justify-content: center;
            gap: 15px;
            background: #080767;
            width: 100%; /* FIX */
            height: 60px;
            align-items: center;
            margin-top: 20px;
        }

        .social {
            width: 45px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 18px;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="main">
        <div class="qr-container">

            <img src="./image/lo.png" class="logo">

            <h1>QR Generator</h1>
            <p>Create smart QR codes</p>

            <div class="input-group">
                <div class="input-wrapper">
                    <input type="text" id="text" placeholder="Enter text or URL">
                    <button class="paste-btn" onclick="pasteText()">📋</button>
                </div>

                <button class="btn-primary" onclick="generateQR()">Generate QR</button>
            </div>

            <div id="controls">
                <div class="control-row">
                    <select id="style" onchange="updateQR()">
                        <option value="dots">Rounded</option>
                        <option value="square">Square</option>
                        <option value="extra-rounded">Extra Round</option>
                        <option value="classy">Classy</option>
                        <option value="classy-rounded">Classy Round</option>
                    </select>

                    <div class="color-picker">
                        <input type="color" id="color" value="#3a86ff" onchange="updateQR()">
                        <span class="color-icon">🎨</span>
                    </div>
                </div>

                <button class="btn-secondary" onclick="downloadQR()">Download QR</button>
            </div>

            <div id="qrBox"></div>

        </div>
    </div>

    <footer class="footer">
        <a href="#" class="social"><i class="fa-brands fa-facebook-f"></i></a>
        <a href="#" class="social"><i class="fa-brands fa-instagram"></i></a>
        <a href="#" class="social"><i class="fa-brands fa-tiktok"></i></a>
    </footer>

    <script>
        let qrCode;

        async function pasteText() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById("text").value = text;
            } catch {
                alert("Clipboard not allowed");
            }
        }

        function generateQR() {
            let text = document.getElementById("text").value;
            if (!text.trim()) return alert("Enter text");

            const box = document.getElementById("qrBox");
            box.innerHTML = "";
            box.style.display = "flex";
            document.getElementById("controls").style.display = "block";

            qrCode = new QRCodeStyling({
                width: 280,
                height: 280,
                data: text,
                dotsOptions: {
                    color: document.getElementById("color").value,
                    type: "dots"
                },
                backgroundOptions: { color: "transparent" }
            });

            qrCode.append(box);
        }

        function updateQR() {
            if (!qrCode) return;

            qrCode.update({
                dotsOptions: {
                    color: document.getElementById("color").value,
                    type: document.getElementById("style").value
                }
            });
        }

        function downloadQR() {
            qrCode.download({
                name: "qr-code",
                extension: "png"
            });
        }
    </script>

</body>

</html>
